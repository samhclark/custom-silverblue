name: Build bootc image
on:
  pull_request:
  merge_group:
  schedule:
    - cron: '48 3 * * *'  # 3am-ish UTC everyday 
  workflow_dispatch:

env:
  UV_VERSION: "0.11.17"

jobs:
  lint:
    name: Lint and test Python
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        run: pipx install "uv==${UV_VERSION}"

      - name: Check
        run: make check

      - name: Test
        run: make test

  build-custom-silverblue:
    name: Build image
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.ref != 'refs/heads/main' }}
    uses: ./.github/workflows/reusable-build.yaml
    permissions:
      contents: read
    with:
      containerfile_path: ./Containerfile
      registry: ghcr.io
      namespace: samhclark
      image_name: custom-silverblue
      tags: |
        44
      publish: false

  publish-custom-silverblue:
    name: Build, sign, and publish image
    if: ${{ github.event_name != 'pull_request' && github.event_name != 'merge_group' && github.ref == 'refs/heads/main' }}
    uses: ./.github/workflows/reusable-build.yaml
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    with:
      containerfile_path: ./Containerfile
      registry: ghcr.io
      namespace: samhclark
      image_name: custom-silverblue
      tags: |
        44
      publish: true
    secrets:
      cosign_password: ${{ secrets.COSIGN_PASSWORD }}
      cosign_private_key: ${{ secrets.COSIGN_PRIVATE_KEY }}
